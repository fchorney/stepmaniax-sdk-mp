name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            install: sudo apt-get update && sudo apt-get install -y libhidapi-dev
          - os: macos-latest
            install: brew install hidapi
          - os: macos-13
            install: brew install hidapi
          - os: windows-latest
            install: vcpkg install hidapi

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: ${{ matrix.install }}

      - name: Configure (Unix)
        if: runner.os != 'Windows'
        run: cmake -B build -DBUILD_TESTS=ON -DBUILD_SAMPLE=ON

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -B build -DBUILD_TESTS=ON -DBUILD_SAMPLE=ON -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build --output-on-failure -C Release
